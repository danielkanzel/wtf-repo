# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  workflow_dispatch:

permissions:
  contents: write
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Clone self
        uses: actions/checkout@v4
        
      - name: Clone remote
        uses: actions/checkout@v4
        with:
          repository: 'razzant/ouroboros_cloud'
          token: ${{ secrets.PAT }} # Use your custom secret name
          path: './ouroboros_cloud' # Directory to clone into

      # Runs a set of commands using the runners shell
      - name: Make archive
        run:  tar -czf - ouroboros_cloud | gpg -c --batch --passphrase "${{ secrets.PSWD }}" > archive.tar.gz

      - name: Remove this shit
        run: rm -r ouroboros_cloud

      - name: Save archive
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
          git pull
          git add . 
          git commit -m "hehe" 
          git push || true
          
      - name: Generate release tag
        id: generate_release_tag
        uses: amitsingh-007/next-release-tag@v6.3.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: 'v'
          tag_template: 'yyyy.mm.dd.i'

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            archive.tar.gz
          tag_name: ${{ steps.generate_release_tag.outputs.next_release_tag }}
          name: "Release ${{ steps.generate_release_tag.outputs.next_release_tag }}"
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
